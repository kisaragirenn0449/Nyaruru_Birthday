<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>にゃるるへ</title>

    <link rel="stylesheet" href="/birthday/css/common.css" />
    <link rel="stylesheet" href="/birthday/css/message.css" />
    <link rel="stylesheet" href="/birthday/css/animation.css" />
  </head>

  <body>
    <header></header>

    <main>
      <section class="gallery">
        <article class="card">
          <img
            src="img/suiren.png"
            alt="suirenからのメッセージ"
            class="gallery-image"
            onclick="openModal(this)"
          />

          <h2>suirenから</h2>
        </article>
        <article class="card">
          <img
            src="img/ayaseusagi.png"
            alt="あやせうさぎからのメッセージ"
            class="gallery-image"
            onclick="openModal(this)"
          />

          <h2>あやせうさぎから</h2>
        </article>

        <article class="card">
          <img
            src="img/touro.png"
            alt="灯炉ぼたんからのメッセージ"
            class="gallery-image"
            onclick="openModal(this)"
          />

          <h2>灯炉ぼたんから</h2>
        </article>

        <article class="card">
          <img
            src="img/hikage.png"
            alt="日景むぎからのメッセージ"
            class="gallery-image"
            onclick="openModal(this)"
          />

          <h2>日景むぎから</h2>
        </article>

        <article class="card">
          <img
            src="img/komainu.png"
            alt="白犬コマからのメッセージ"
            class="gallery-image"
            onclick="openModal(this)"
          />

          <h2>白犬コマから</h2>
        </article>
        <article class="card">
          <img
            src="img/ruu.png"
            alt="るぅからのメッセージ"
            class="gallery-image"
            onclick="openModal(this)"
          />

          <h2>るぅから</h2>
        </article>

        <article class="card">
          <img
            src="img/tanatosu.png"
            alt="たなとすからのメッセージ"
            class="gallery-image"
            onclick="openModal(this)"
          />

          <h2>たなとすから</h2>
        </article>

        <article class="card">
          <img
            src="img/taneo.png"
            alt="たねおからのメッセージ"
            class="gallery-image"
            onclick="openModal(this)"
          />

          <h2>たねおから</h2>
        </article>

        <article class="card" id="alicell">
          <img
            src="img/alicell/alicell.png"
            class="gallery-image"
            alt="ありせるみみみから"
          />
          <h2>ありせるみみみから</h2>
        </article>

        <article class="card" id="hiro">
          <img
            src="img/hiro/hiro.png"
            class="gallery-image"
            alt="ひろくんから"
          />
          <h2>ひろから</h2>
        </article>

        <article class="card" id="kisaragirenn">
          <img
            src="img/kisaragirenn/kisaragirenn.png"
            class="gallery-image"
            alt="如月レンから"
          />
          <h2>如月レンから</h2>
        </article>
      </section>

      <button id="downloadButton" class="download-button">
        📦 ダウンロード
      </button>
    </main>

    <div id="viewer" class="viewer">
      <button id="closeButton" class="viewer-close">&times;</button>

      <button id="prevButton" class="viewer-button prev">❮</button>

      <img id="viewerImage" class="viewer-image" alt="" />

      <button id="nextButton" class="viewer-button next">❯</button>

      <div id="thumbnailContainer" class="thumbnail-container"></div>
    </div>

    <div id="imageModal" class="modal">
      <span class="close" onclick="closeModal()">&times;</span>

      <img id="modalImg" class="modal-content" alt="" />
    </div>

    <script src="../js/modal.js"></script>
    <script src="../js/modal2.js"></script>
    <script src="../js/download.js"></script>
  </body>
</html>
